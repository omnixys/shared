name: Publish package

on:
  workflow_run:
    workflows: ['Release Package']
    types: [completed]
  # # push:
  #   branches: [main]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - run: pnpm install
      - run: pnpm build

      - name: Setup npm registry auth
        run: |
          echo "@omnixys:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${OMNIXYS_TOKEN}" >> .npmrc
        env:
          OMNIXYS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm publish --no-git-checks
        env:
          OMNIXYS_TOKEN: ${{ secrets.GITHUB_TOKEN }}